content:
  summary: '/kokoro-overlay — Claude Code skill that takes a short video + Whisper verbose_json, builds an ffmpeg drawtext filter chain for synchronized phrase-level captions, and renders vertical 9:16 output with captions in the lower third.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'Captions appear synchronized with audio (within 0.5s of Whisper timestamps)'
      verifiable: true
    - id: AC2
      description: 'Output defaults to vertical 9:16 (1080x1920); user can override to keep original'
      verifiable: true
    - id: AC3
      description: 'Captions readable against any background (white text, black stroke border width 3)'
      verifiable: true
    - id: AC4
      description: 'Output saves as {basename}-captioned.mp4 with summary JSON'
      verifiable: true
    - id: AC5
      description: 'Special characters in transcript are properly escaped for ffmpeg drawtext'
      verifiable: true
  integration_points:
    - module: 'kokoro-shorts'
      change_type: read
      files: ['shorts output videos in /tmp/kokoro-shorts/', 'shorts summary JSON']
    - module: 'kokoro-listen'
      change_type: read
      files: ['Whisper verbose_json transcript files']
    - module: 'ffmpeg'
      change_type: new
      files: ['ffmpeg drawtext filter chain for captions + crop+scale for vertical reformat']
    - module: 'kokoro-shorts-skill'
      change_type: modify
      files: ['.claude/commands/kokoro-shorts.md — update next-step reference to point to overlay']
    - module: 'test_output_structure'
      change_type: modify
      files: ['tests/test_output_structure.py — add kokoro-overlay to COACHING_SKILLS, EXISTING_COMMANDS']
  decisions:
    - id: D1
      choice: 'drawtext (not ASS subtitles)'
      rationale: 'Simpler, single ffmpeg command, no external .ass file to manage. Sufficient for phrase-level captions. ASS would add complexity (file generation, font embedding) for features not needed (animations, multi-color, karaoke).'
      alternatives_considered: ['ASS subtitles (more style control but overkill for phrase-level)', 'SRT burn-in via subtitles filter (requires external file, less positioning control)']
    - id: D2
      choice: 'Phrase-level captions (Whisper segments, 2-8 words)'
      rationale: 'Whisper verbose_json provides segment-level timestamps natively. Proven effective on social media. Word-level requires additional API params AND complex drawtext chaining per word — excessive for M story.'
      alternatives_considered: ['Word-level karaoke-style (trendy but complex)', 'Full sentence display (too much text on screen)']
    - id: D3
      choice: 'Overlay handles vertical reformat (default 9:16)'
      rationale: 'Overlay must know final frame dimensions for caption positioning. One ffmpeg command does crop+scale+drawtext. Separate reformat step would add complexity and positioning ambiguity.'
      alternatives_considered: ['Expect pre-formatted vertical input from kokoro-shorts', 'Two-pass: reformat then overlay (unnecessary extra step)']
    - id: D4
      choice: 'No re-transcription — expects existing Whisper verbose_json'
      rationale: 'kokoro-shorts already produces/uses Whisper verbose_json. Re-transcribing wastes ~$0.02 and duplicates work. Transcript is already a pipeline artifact.'
      alternatives_considered: ['Re-transcribe for each short (wasteful)', 'Accept plain text without timestamps (no sync possible)']
    - id: D5
      choice: 'Explicit escaping function for drawtext special chars'
      rationale: 'ffmpeg drawtext parsing is fragile — unescaped colon, quote, backslash, or percent cause silent failures. Explicit escaping with documented function is more reliable.'
      alternatives_considered: ['Hope text is clean (unreliable for Spanish text with accents and punctuation)', 'Use ASS format which has simpler escaping (rejected in D1)']
  components:
    - action: create
      path: '.claude/commands/kokoro-overlay.md'
      description: 'Skill definition — prompt instructions for transcript parsing, drawtext filter construction, vertical reformat, and output organization'
    - action: create
      path: '.claude/knowledge/kokoro-overlay-ffmpeg.md'
      description: 'Knowledge file with ffmpeg drawtext reference for captions, escaping rules, and vertical reformat commands'
    - action: modify
      path: '.claude/commands/kokoro-shorts.md'
      description: 'Update next-step reference to point to /kokoro-overlay'
    - action: modify
      path: 'tests/test_output_structure.py'
      description: 'Add kokoro-overlay to COACHING_SKILLS and EXISTING_COMMANDS'
