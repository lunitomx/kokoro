metadata:
  platform_account_schema:
    meta_ads: 'act_123456 (Ad account ID prefixed with act_)'
    google_ads: '1234567890 (10-digit customer ID)'
    ga4: 'properties/123456 (Property resource name)'
    gsc: 'https://example.com (Verified site URL)'
  mcp_tools:
    meta_ads: 'facebook-ads → list_ad_accounts'
    google_ads: 'google-ads → list_customers'
    ga4: 'google-analytics → get_account_summaries'
    gsc: 'google-search-console → list_properties'
