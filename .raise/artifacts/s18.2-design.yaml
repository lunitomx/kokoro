story: 'S18.2'
epic: 'E18'
content:
  summary: '/kokoro-cuts — Claude Code skill that reads a kokoro-listen transcript and uses LLM inference to identify the best 30-60s moments for shorts/reels, producing ranked cuts with suggested titles and hooks.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'Skill reads any kokoro-listen transcript (plain text with header) and produces ranked cuts'
      verifiable: true
    - id: AC2
      description: 'Each cut includes: paragraph reference (start/end sentence), suggested title, hook text, quality score (1-10)'
      verifiable: true
    - id: AC3
      description: 'Output includes both human-readable presentation (markdown) and structured JSON for /kokoro-shorts'
      verifiable: true
    - id: AC4
      description: 'Short videos (<5 min) produce 1-3 cuts; longer videos (>5 min) produce 5-10 cuts'
      verifiable: true
    - id: AC5
      description: 'Cuts prioritize content density and hook-worthy opening lines'
      verifiable: true
    - id: AC6
      description: 'Eduardo can approve/reject/adjust cuts interactively before passing to /kokoro-shorts'
      verifiable: true
  integration_points:
    - module: 'kokoro-listen'
      change_type: read
      files: ['transcript .txt files in /tmp/kokoro-listen/ or clientes/*/transcripciones/']
    - module: 'kokoro-shorts'
      change_type: write
      files: ['JSON output consumed downstream by /kokoro-shorts (S18.3)']
    - module: 'test_output_structure'
      change_type: modify
      files: ['tests/test_output_structure.py — add kokoro-cuts to COACHING_SKILLS, VALID_COMMANDS, EXISTING_COMMANDS']
  decisions:
    - id: D1
      choice: 'Sentence-boundary references, not timestamps or character offsets'
      rationale: 'kokoro-listen produces plain text (Whisper response_format=text). No word-level timestamps exist. Referencing by sentence boundaries ("from sentence X to sentence Y") is human-readable and sufficient for /kokoro-shorts to locate segments. When kokoro-listen adds verbose_json support in the future, kokoro-cuts can upgrade to timestamp references without changing its interface contract.'
      alternatives_considered: ['Paragraph numbers (transcript is one paragraph)', 'Character offsets (not human-readable)', 'Re-transcribe with verbose_json (extra cost, blocks this story)', 'Require kokoro-listen changes (coupling)']
    - id: D2
      choice: 'Pure LLM inference via Claude (no heuristic scoring)'
      rationale: 'The transcript is already loaded in Claude context during skill execution. Claude excels at understanding content density, identifying impactful phrases, detecting topic transitions, and recognizing emotional peaks — all from text. Heuristic rules (word count, keyword matching) would be inferior for this semantic task. OpenShorts evaluation (S18.1) confirmed LLM-based moment detection is the right approach.'
      alternatives_considered: ['Heuristic rules (word density, keywords)', 'Hybrid (heuristics + LLM)', 'External API (Gemini, as OpenShorts does)']
    - id: D3
      choice: 'JSON with cuts array, each containing excerpt, title, hook, score, and position metadata'
      rationale: '/kokoro-shorts needs: (1) the text excerpt to locate in transcript, (2) title for the short, (3) hook text for overlay, (4) score for prioritization. Position metadata (sentence range) helps /kokoro-shorts locate the segment in the original audio. The JSON file is saved alongside the transcript for traceability.'
      alternatives_considered: ['YAML output', 'Markdown-only (no structured data)', 'CSV']
  components:
    - action: create
      path: '.claude/commands/kokoro-cuts.md'
      description: 'Skill definition — prompt instructions for Claude to analyze transcripts and produce cuts'
    - action: create
      path: 'knowledge/kokoro-cuts.md'
      description: 'Knowledge file with scoring criteria, output format spec, and examples'
    - action: modify
      path: 'tests/test_output_structure.py'
      description: 'Add kokoro-cuts to COACHING_SKILLS, VALID_COMMANDS, EXISTING_COMMANDS'
