artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-03-09T12:00:00Z'
story: 'S1.8'
epic: 'E1'
content:
  summary: 'Create /kokoro router and /kokoro-session manager skills — the meta layer that guides entrepreneurs through Phase 1 without needing to know skill names or order.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'kokoro.md exists in extension/.claude/commands/'
      verifiable: true
    - id: AC2
      description: 'kokoro-session.md exists in extension/.claude/commands/'
      verifiable: true
    - id: AC3
      description: 'Router asks diagnostic questions and recommends the appropriate next Phase 1 skill'
      verifiable: true
    - id: AC4
      description: 'Router references all 4 Phase 1 skills by name and follows methodology order (Diagnóstico → Visión → Poda → Finanzas)'
      verifiable: true
    - id: AC5
      description: 'Session skill supports start flow — initializes journey and explains Phase 1 roadmap'
      verifiable: true
    - id: AC6
      description: 'Session skill supports continue flow — reviews completed work and identifies next step'
      verifiable: true
    - id: AC7
      description: 'Session skill supports review flow — structured Phase 1 progress summary'
      verifiable: true
    - id: AC8
      description: 'kokoro init copies both kokoro.md and kokoro-session.md to .claude/commands/'
      verifiable: true
    - id: AC9
      description: 'All tests pass, pyright + ruff clean'
      verifiable: true
  integration_points:
    - module: 'extension.claude.commands'
      change_type: new
      files: ['extension/.claude/commands/kokoro.md', 'extension/.claude/commands/kokoro-session.md']
    - module: 'src.kokoro.cli'
      change_type: modification
      files: ['src/kokoro/cli.py']
    - module: 'tests'
      change_type: new
      files: ['tests/test_kokoro_router.py', 'tests/test_kokoro_session.py']
  decisions:
    - id: D1
      choice: 'Modify _copy_dir_no_overwrite to match files starting with "kokoro" (not just "kokoro-")'
      rationale: 'Current prefix check `item.name.startswith("kokoro-")` excludes kokoro.md. The router is Kokoro-owned and should be updated on reinstall. Change to `item.name.startswith("kokoro")` to cover both kokoro.md and kokoro-*.md files.'
      alternatives_considered: ['Accept asymmetric behavior (kokoro.md not overwritten, kokoro-session.md overwritten)', 'Rename to kokoro-router.md to match prefix pattern']
    - id: D2
      choice: 'Simple question-based routing — 3-4 questions to determine Phase 1 position'
      rationale: 'User self-reports progress. No persistent state needed. Simple questions like "Have you done a business diagnostic?" map directly to skill recommendations. Matches scope exclusion of automatic detection.'
      alternatives_considered: ['Checklist approach', 'File-based progress tracking']
    - id: D3
      choice: 'Session state lives in conversation context — no file persistence'
      rationale: 'Claude Code sessions naturally maintain context. Scope explicitly excludes persistent state across sessions. The skill asks the user where they are, matching the Projector strategy (ask before guiding).'
      alternatives_considered: ['JSON state file in project', 'Markdown progress log']
  risks:
    - description: 'Changing startswith("kokoro-") to startswith("kokoro") could affect future non-Kokoro files starting with "kokoro" (unlikely)'
      mitigation: 'The extension/commands/ directory is Kokoro-owned; no third-party files expected'
refs:
  backlog_item: ''
  epic_scope: 'work/epics/e1-kokoro-phase1/scope.md'
metadata: {}
